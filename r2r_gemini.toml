[app]
fast_llm = "gemini/gemini-2.0-flash"
quality_llm = "gemini/gemini-2.0-flash"
vlm = "gemini/gemini-2.0-flash"
reasoning_llm = "gemini/gemini-2.0-flash"
planning_llm = "gemini/gemini-2.0-flash"

[auth]
provider = "r2r"
access_token_lifetime_in_minutes = 60000
refresh_token_lifetime_in_days = 7
require_authentication = false
require_email_verification = false
default_admin_email = "admin@example.com"
default_admin_password = "change_me_immediately"

[completion]
provider = "r2r"
concurrent_request_limit = 32

  [completion.generation_config]
  temperature = 0.1
  top_p = 1
  max_tokens_to_sample = 4096
  stream = false

[embedding]
provider = "litellm"
base_model = "gemini/gemini-embedding-001"
base_dimension = 3072
batch_size = 32
concurrent_request_limit = 32

[completion_embedding]
provider = "litellm"
base_model = "gemini/gemini-embedding-001"
base_dimension = 3072
batch_size = 32
concurrent_request_limit = 32
