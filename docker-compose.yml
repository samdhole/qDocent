name: qdocent

networks:
  qdocent:
    driver: bridge

volumes:
  r2r_pg_data:

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${R2R_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${R2R_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${R2R_POSTGRES_DBNAME:-postgres}
    volumes:
      - r2r_pg_data:/var/lib/postgresql/data
    networks:
      - qdocent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${R2R_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  r2r:
    image: sciphiai/r2r:3.6.6
    environment:
      R2R_CONFIG_PATH: /app/r2r_gemini.toml
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      R2R_POSTGRES_HOST: postgres
      R2R_POSTGRES_PORT: ${R2R_POSTGRES_PORT:-5432}
      R2R_POSTGRES_USER: ${R2R_POSTGRES_USER:-postgres}
      R2R_POSTGRES_PASSWORD: ${R2R_POSTGRES_PASSWORD:-postgres}
      R2R_POSTGRES_DBNAME: ${R2R_POSTGRES_DBNAME:-postgres}
    volumes:
      - ./r2r_gemini.toml:/app/r2r_gemini.toml:ro
    ports:
      - "7272:8000"
    networks:
      - qdocent
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/v3/health > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      R2R_BASE_URL: http://r2r:8000
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      R2R_ADMIN_EMAIL: ${R2R_ADMIN_EMAIL}
      R2R_ADMIN_PASSWORD: ${R2R_ADMIN_PASSWORD}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      HOME: /tmp
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks:
      - qdocent
    depends_on:
      r2r:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_DEMO_NOTEBOOK_ID: ${NEXT_PUBLIC_DEMO_NOTEBOOK_ID:-}
    environment:
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    networks:
      - qdocent
    depends_on:
      api:
        condition: service_healthy
