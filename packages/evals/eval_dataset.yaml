# Evaluation dataset for RAGAS scoring.
# Mix: policy, pricing/table lookup, architecture, and refusal questions.
questions:
  - id: refund_policy
    category: policy
    user_input: "What is the refund policy?"
    reference: >
      The answer should state the 30-day refund window, the requirement to
      contact support@acme.example, and that approval from the Customer
      Success Manager is required. Based only on the uploaded policy document.

  - id: refund_approval
    category: policy
    user_input: "Who has to approve a customer refund?"
    reference: >
      The answer should identify the Customer Success Manager as the approver
      for refunds. It should cite the uploaded company policy document and
      avoid inventing other approval paths.

  - id: enterprise_discount
    category: pricing
    user_input: "Who can approve an enterprise discount above 20%?"
    reference: >
      The answer should identify VP Sales as the approver for discounts above
      20%, and account executives for discounts up to 20%. Based only on the
      uploaded policy document.

  - id: pro_plan_price
    category: pricing
    user_input: "What does the Pro plan cost and what support does it include?"
    reference: >
      The Pro plan costs $99 per month, supports 5 users, and includes email
      and chat support. Based only on the uploaded pricing document.

  - id: enterprise_plan_support
    category: pricing
    user_input: "What support level comes with the Enterprise plan?"
    reference: >
      The answer should identify the Enterprise plan support level from the
      uploaded pricing table and should not substitute Pro-plan support details.

  - id: starter_plan_limits
    category: pricing
    user_input: "How many users are included in the Starter plan?"
    reference: >
      The answer should state the Starter plan user limit from the uploaded
      pricing table and avoid adding unsupported limits or features.

  - id: ingestion_stack
    category: architecture
    user_input: "What components make up the document ingestion and question-answering stack?"
    reference: >
      The answer should describe the DocQuery architecture using the uploaded
      architecture report: ingestion/parsing/chunking, R2R retrieval, FastAPI,
      Next.js UI, and RAGAS evaluation.

  - id: evaluation_metrics
    category: architecture
    user_input: "Which evaluation metrics are used to judge RAG answer quality?"
    reference: >
      The answer should identify RAGAS metrics such as faithfulness,
      answer relevancy, and context precision, based only on the uploaded
      architecture or evaluation material.

  - id: figure_pipeline
    category: architecture
    user_input: "How are figures handled during ingestion?"
    reference: >
      The answer should explain that figures are extracted during ingestion,
      stored under the figure asset directory, described in a manifest, and
      attached to answers when matched by citation or retrieved figure text.

  - id: unsupported_ceo_phone
    category: refusal
    user_input: "What is the CEO's personal phone number?"
    reference: >
      The system should refuse or state the answer is not available in the
      provided context. It must not hallucinate contact information.

  - id: unsupported_bank_account
    category: refusal
    user_input: "What is Acme's bank account number for wire transfers?"
    reference: >
      The system should refuse or state that the answer is not available in
      the uploaded documents. It must not invent bank details.

  - id: unsupported_employee_salary
    category: refusal
    user_input: "What is the private salary of the Customer Success Manager?"
    reference: >
      The system should refuse or state that the uploaded documents do not
      contain this private employee information. It must not guess a salary.
